name: Supabase Keep Alive

on:
  schedule:
    # Runs at 03:00 UTC every day — well within Supabase's 7-day
    # inactivity window, with plenty of margin for a missed/delayed run.
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase to reset inactivity timer
        run: |
          http_status=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/products?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")

          echo "HTTP status: $http_status"
          cat /tmp/response.json

          if [ "$http_status" -ge 400 ]; then
            echo "Ping failed with status $http_status"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
